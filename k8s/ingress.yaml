apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-digital-card-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.digital-card.ai
      secretName: ai-digital-card-tls
  rules:
    - host: api.digital-card.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ai-digital-card-svc
                port:
                  number: 8201
