# 金丝雀发布 Nginx 路由配置
# AI数字名片 — 按流量百分比分流
#
# 使用:
#   1. 将此文件挂载到 Nginx 的 /etc/nginx/conf.d/
#   2. 确保 stable 后端运行在 8203, canary 后端运行在 8204
#   3. 重载 Nginx: nginx -s reload
#
# 分流逻辑:
#   split_clients 基于 ${remote_addr} (客户端 IP) 做一致性哈希
#   10% 请求流入 canary 后端, 90% 流入 stable 后端
#
# 运行时调整权重:
#   方案A: 修改配置中的 split_clients 百分比后 reload
#   方案B: 使用 nginx_proxy.py 动态控制（在 deploy/nginx_proxy.py）

upstream backend_stable {
    server 127.0.0.1:8203 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

upstream backend_canary {
    server 127.0.0.1:8204 max_fails=3 fail_timeout=10s;
    keepalive 8;
}

# ── 一致性哈希分流 ────────────────────────────────────
# 根据客户端 IP 做哈希分配，同一 IP 始终落到同一后端
split_clients "${remote_addr}${http_user_agent}" $canary_backend {
    10%    backend_canary;   # ← 金丝雀比例 (可调整)
    *      backend_stable;   # ← 稳定版本
}

server {
    listen 8200;
    server_name localhost;

    # ── 健康检查 ──────────────────────────────────────
    location /health {
        proxy_pass http://backend_stable;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    location /canary/health {
        proxy_pass http://backend_canary;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    # ── 前端静态资源 ──────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:8201;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── API 路由 (金丝雀分流) ────────────────────────
    location /api/ {
        # 注入金丝雀标识头 (便于调试和指标分类)
        add_header X-Canary $canary_backend always;

        proxy_pass http://$canary_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时配置
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;

        # 缓存关闭 (API 不缓存)
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # ── API 文档 (强制走 stable) ──────────────────────
    location /docs {
        proxy_pass http://backend_stable;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://backend_stable;
        proxy_set_header Host $host;
    }

    # ── Metrics (强制走 stable) ───────────────────────
    location /metrics {
        proxy_pass http://backend_stable;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── 安全头 ────────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
}
