# ════════════════════════════════════════════════════
# AI数智名片 — 蓝绿部署 Nginx 路由配置
# ════════════════════════════════════════════════════
# 蓝绿两套独立后端 upstream，通过 active_backend 变量切换
#
# 用法:
#   1. 挂载到 Nginx 的 /etc/nginx/conf.d/bluegreen.conf
#   2. 通过 switch.sh 切换 active_backend 的值
#   3. 重载 Nginx: nginx -s reload
#
# 端口规划:
#   蓝色 (Blue):  后端 8201  (default, 当前生产)
#   绿色 (Green): 后端 8202  (standby, 新版本)
#   接入层:       8200       (Nginx 监听端口)
#
# 切换方式:
#   方案A: 运行 deploy/bluegreen/switch-blue.sh 或 switch-green.sh
#   方案B: 修改下方 map 块中的 default 值后 nginx -s reload
# ════════════════════════════════════════════════════

# ── Upstream: 蓝色环境 ─────────────────────────────
upstream backend_blue {
    server 127.0.0.1:8201 max_fails=3 fail_timeout=10s weight=1;
    keepalive 32;
}

# ── Upstream: 绿色环境 ─────────────────────────────
upstream backend_green {
    server 127.0.0.1:8202 max_fails=3 fail_timeout=10s weight=1;
    keepalive 32;
}

# ── 活跃后端选择 ────────────────────────────────────
# 通过 map 指令实现变量级切换
# default: blue — 修改此值来切换流量方向
# 支持的取值: "backend_blue" | "backend_green"
map "" $active_backend {
    default backend_blue;
}

# ── 主 server 块 ───────────────────────────────────
server {
    listen 8200;
    server_name localhost _;

    # ── 全局配置 ──────────────────────────────────
    charset utf-8;
    client_max_body_size 100m;

    # ── 日志 ──────────────────────────────────────
    access_log /var/log/nginx/ai-digital-card-access.log;
    error_log  /var/log/nginx/ai-digital-card-error.log;

    # ── Gzip 压缩 ────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_comp_level 6;

    # ── 安全头 — OWASP 全量配置 ──────────────────
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';
         img-src 'self' data: https:; font-src 'self' data:;
         connect-src 'self' https://api.liankebao.top wss:;
         object-src 'none'; frame-ancestors 'none'; base-uri 'self';
         form-action 'self'" always;
    add_header Strict-Transport-Security
        "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy
        "camera=(), microphone=(), geolocation=(), interest-cohort=(),
         payment=(), usb=(), bluetooth=(), midi=(), sync-xhr=(),
         xr-spatial-tracking=()" always;

    # ── 健康检查端点 ── 分别检查蓝绿两套 ──────────────────
    location /health {
        proxy_pass http://$active_backend/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 5s;
        access_log off;
    }

    # 直接访问蓝色后端健康检查（用于部署验证）
    location /health/blue {
        proxy_pass http://backend_blue/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 5s;
        access_log off;
    }

    # 直接访问绿色后端健康检查（用于部署验证）
    location /health/green {
        proxy_pass http://backend_green/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 5s;
        access_log off;
    }

    # ── API 路由 → 当前活跃后端 ───────────────────
    location /api/ {
        # 标识当前活跃环境（便于调试）
        add_header X-Active-Env $active_backend always;

        proxy_pass http://$active_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # 大文件上传（视频）增加超时
        location /api/brochures/upload-video {
            proxy_pass http://$active_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_request_buffering off;
        }
    }

    # ── 静态文件路由 → 前端 dist ──────────────────
    location / {
        root /var/www/ai-digital-card/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;

        # 静态文件缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Metrics ──────────────────────────────────────
    location /metrics {
        proxy_pass http://$active_backend;
        proxy_set_header Host $host;
        access_log off;
    }
}

# ── HTTPS server 块 ───────────────────────────────
server {
    listen 8200 ssl http2;
    server_name localhost _;

    ssl_certificate     /etc/ssl/certs/ai-digital-card.pem;
    ssl_certificate_key /etc/ssl/private/ai-digital-card.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 安全头同上
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';
         img-src 'self' data: https:; font-src 'self' data:;
         connect-src 'self' https://api.liankebao.top wss:;
         object-src 'none'; frame-ancestors 'none'; base-uri 'self';
         form-action 'self'" always;
    add_header Strict-Transport-Security
        "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy
        "camera=(), microphone=(), geolocation=(), interest-cohort=(),
         payment=(), usb=(), bluetooth=(), midi=(), sync-xhr=(),
         xr-spatial-tracking=()" always;

    location /api/ {
        proxy_pass http://$active_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location / {
        root /var/www/ai-digital-card/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
