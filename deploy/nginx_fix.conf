# ── HTTPS Server ──
server {
    listen 443 ssl http2;
    server_name liankebao.top www.liankebao.top card.liankebao.top;

    ssl_certificate /etc/letsencrypt/live/liankebao.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/liankebao.top/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    gzip on;
    gzip_types text/css text/plain application/json application/javascript image/svg+xml application/xml;
    gzip_min_length 1000;
    gzip_vary on;

    error_page 404 /404.html;
    location = /404.html { root /opt/chainke/backend/static; }

    # GEO诊断页面

    # AI数字名片 API（card.liankebao.top）
    location /api/auth/ {
        proxy_pass http://127.0.0.1:8201;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    # 无尾斜杠也匹配，兼容微信小程序 wx.request（不跟随 301 重定向）
    location /api/brochures {
        proxy_pass http://127.0.0.1:8201;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/business-card/ {
        proxy_pass http://127.0.0.1:8201;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /health {
        proxy_pass http://127.0.0.1:8201/health;
        proxy_set_header Host $host;
    }

    # AI数字名片 — 信任网络
    location /api/trust/ {
        proxy_pass http://127.0.0.1:8201;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # AI数字名片 — 用户
    location /api/users/ {
        proxy_pass http://127.0.0.1:8201;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # AI数字名片 — 匹配
    location /api/match/ {
        proxy_pass http://127.0.0.1:8201;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # AI数字名片 — 访客
    location /api/visitors/ {
        proxy_pass http://127.0.0.1:8201;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # AI数字名片 — AI模块
    location /api/ai/ {
        proxy_pass http://127.0.0.1:8201;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # AI数字名片 — 标签
    # AI数字名片 — 标签（兼容无尾斜杠，微信小程序 wx.request 不跟随 301）
    location /api/tags {
        proxy_pass http://127.0.0.1:8201;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # AI数字名片 — 盖娅
    location /api/gaia/ {
        proxy_pass http://127.0.0.1:8201;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # AI数字名片 — 通讯录
    location /api/contacts/ {
        proxy_pass http://127.0.0.1:8201;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        alias /opt/chainke/backend/static/;
        try_files admin.html =404;
    }

    root /opt/chainke/frontend/dist;
    index index.html;
    location / { try_files $uri $uri/ /index.html; }

    location = /status { alias /opt/chainke/backend/static/status.html; }
    location = /growth { alias /opt/chainke/backend/static/growth.html; }
    location = /network { alias /opt/chainke/backend/static/network.html; }
    location = /guide { alias /opt/chainke/backend/static/guide.html; }
    location = /faq { alias /opt/chainke/backend/static/faq.html; }
    location = /privacy { alias /opt/chainke/backend/static/privacy.html; }
    location = /terms { alias /opt/chainke/backend/static/terms.html; }
    location = /contact { alias /opt/chainke/backend/static/contact.html; }
    location = /messages { alias /opt/chainke/backend/static/messages.html; }
    location = /about { alias /opt/chainke/backend/static/about.html; }
    location = /ai-card { alias /opt/chainke/backend/static/ai-card.html; }
    location = /ai-matching { alias /opt/chainke/backend/static/ai-matching.html; }
    location = /digital-card { alias /opt/chainke/backend/static/digital-card.html; }
    location = /sitemap-page { alias /opt/chainke/backend/static/sitemap-page.html; }
    location = /sandbox { alias /opt/chainke/backend/static/sandbox.html; }
    location = /geo-diagnosis { root /opt/chainke/backend/static; try_files /geo-diagnosis.html =404; }
    location = /match-demo { alias /opt/chainke/backend/static/match-demo.html; }
    location = /dashboard-user { alias /opt/chainke/backend/static/dashboard-user.html; }

    location ~*\.(jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ { expires 30d; add_header Cache-Control "public, immutable"; access_log off; }
    location ~*\.(css|js)$ { expires 7d; add_header Cache-Control "public, immutable"; }
    location /assets/ { expires 7d; add_header Cache-Control "public, immutable"; }
}

# ── HTTP → HTTPS Redirect ──
server {
    listen 80;
    server_name liankebao.top www.liankebao.top card.liankebao.top;

    location ^~ /.well-known/ {
        root /var/www/letsencrypt;
        default_type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }

    # AI数智公司 SaaS
    location /ai/ {
        proxy_pass http://127.0.0.1:5070/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Script-Name /ai;
    }
}
