version: "3.8"

services:
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: ai-card-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    networks:
      - ai-card-mon

  grafana:
    image: grafana/grafana:11.1.0
    container_name: ai-card-grafana
    restart: unless-stopped
    volumes:
      - ./grafana/dashboard.json:/var/lib/grafana/dashboards/ai_card_dashboard.json:ro
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_INSTALL_PLUGINS=
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_UID=ai-card-observability
    ports:
      - "3000:3000"
    networks:
      - ai-card-mon
    depends_on:
      - prometheus

  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: ai-card-node-exporter
    restart: unless-stopped
    command:
      - "--path.rootfs=/host"
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro
    ports:
      - "9100:9100"
    networks:
      - ai-card-mon

networks:
  ai-card-mon:
    name: ai-card-monitoring
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
