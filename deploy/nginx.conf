# AI数智名片 Nginx 配置
# 接入层端口 8200 → 后端 8002, 前端静态文件

upstream backend {
    server 127.0.0.1:8002;
    keepalive 32;
}

# 后端健康检查端点
server {
    listen 8200;
    server_name _;
    
    # 全局配置
    charset utf-8;
    server_tokens off;
    client_max_body_size 100m;
    
    # 日志
    access_log /var/log/nginx/ai-digital-card-access.log;
    error_log /var/log/nginx/ai-digital-card-error.log;
    
    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_comp_level 6;
    
    # 安全头 — OWASP 全量配置
    # CSP: 限制资源加载来源，防止 XSS 和数据注入
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.liankebao.top wss:; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    # HSTS: 强制 HTTPS，包含所有子域名，预加载
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    # 禁止 MIME 类型嗅探
    add_header X-Content-Type-Options nosniff always;
    # 禁止被嵌入 iframe（防止点击劫持）
    add_header X-Frame-Options DENY always;
    # 跨域请求时只发送 origin 作为 Referer，防止信息泄露
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # 限制浏览器 API 权限（摄像头、麦克风、地理位置等默认禁用）
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=(), payment=(), usb=(), bluetooth=(), midi=(), sync-xhr=(), xr-spatial-tracking=()" always;
    # 移除过时的 X-XSS-Protection 头（已废弃，CSP 提供更完善的保护）
    
    # API 路由 → 后端
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # 大文件上传（视频）增加超时
        location /api/brochures/upload-video {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_request_buffering off;
        }

        # CORS 由后端 FastAPI CORSMiddleware 统一管理
        # 参见 config.py CORS_ORIGINS 白名单配置
    }

    # 静态文件路由 → 前端 dist
    location / {
        root /var/www/ai-digital-card/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
        
        # 静态文件缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
    
    # 健康检查
    location /health {
        proxy_pass http://backend/health;
        proxy_set_header Host $host;
        proxy_read_timeout 5s;
        access_log off;
    }
}

# HTTPS 重定向（生产环境）
server {
    listen 8200 ssl http2;
    server_name _;
    
    ssl_certificate /etc/ssl/certs/ai-digital-card.pem;
    ssl_certificate_key /etc/ssl/private/ai-digital-card.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    
    # 安全头 — OWASP 全量配置（同上）
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.liankebao.top wss:; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=(), payment=(), usb=(), bluetooth=(), midi=(), sync-xhr=(), xr-spatial-tracking=()" always;
    
    # 与上面的 location 块相同
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        
        # CORS 由后端 FastAPI CORSMiddleware 统一管理
        # 参见 config.py CORS_ORIGINS 白名单配置
    }
    
    location / {
        root /var/www/ai-digital-card/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
