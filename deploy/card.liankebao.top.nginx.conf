# ──── AI数智名片 — card.liankebao.top ────
# 此文件需 DNS 解析生效 + certbot 扩展域名后使用
# 部署到: /etc/nginx/sites-enabled/card.liankebao.top
#
# 部署步骤:
#   1. 添加 DNS A 记录: card.liankebao.top → 47.116.116.87
#   2. certbot --nginx -d card.liankebao.top -d liankebao.top -d www.liankebao.top
#   3. sudo cp 此文件 /etc/nginx/sites-enabled/card.liankebao.top
#   4. sudo nginx -t && sudo systemctl reload nginx

server {
    listen 443 ssl http2;
    server_name card.liankebao.top;

    # SSL 证书（与 liankebao.top 共用，certbot 扩展后自动含 card）
    ssl_certificate /etc/letsencrypt/live/liankebao.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/liankebao.top/privkey.pem;
    ssl_session_cache shared:SSL_CARD:10m;
    ssl_session_timeout 10m;

    client_max_body_size 100m;
    charset utf-8;

    # Gzip
    gzip on;
    gzip_types application/json application/javascript text/plain text/css text/xml image/svg+xml;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_comp_level 6;

    # 安全头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── API → 后端 (port 8201) ──
    location /api/ {
        proxy_pass http://127.0.0.1:8201;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── 健康检查 ──
    location /health {
        proxy_pass http://127.0.0.1:8201/health;
        proxy_set_header Host $host;
        access_log off;
    }

    location /api/health {
        proxy_pass http://127.0.0.1:8201/api/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── API 文档 ──
    location /docs {
        proxy_pass http://127.0.0.1:8201/docs;
        proxy_set_header Host $host;
    }

    # ── 前端静态文件（可选，小程序不需要） ──
    location / {
        root /var/www/ai-digital-card/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;

        # 静态文件缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
}

# ── HTTP → HTTPS 跳转 ──
server {
    listen 80;
    server_name card.liankebao.top;
    return 301 https://$host$request_uri;
}
