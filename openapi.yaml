components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT令牌, 通过 /api/auth/login 获取
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API Key, 通过 /api/api-keys 创建
  schemas:
    UserCreate:
      type: object
      required:
      - phone
      - password
      - name
      properties:
        phone:
          type: string
          example: '13800138000'
        password:
          type: string
          minLength: 6
        name:
          type: string
        username:
          type: string
        company:
          type: string
        title:
          type: string
        intro:
          type: string
        avatar:
          type: string
    UserLogin:
      type: object
      required:
      - phone
      - password
      properties:
        phone:
          type: string
        password:
          type: string
    WeChatLogin:
      type: object
      required:
      - code
      properties:
        code:
          type: string
          description: wx.login()返回的临时code
    WeChatMiniLogin:
      type: object
      required:
      - code
      properties:
        code:
          type: string
        user_info:
          type: object
          description: 微信用户信息(可选)
    UserResponse:
      type: object
      properties:
        id:
          type: integer
        phone:
          type: string
        name:
          type: string
        username:
          type: string
        company:
          type: string
        title:
          type: string
        intro:
          type: string
        avatar:
          type: string
        role:
          type: string
        membership_tier:
          type: string
        created_at:
          type: string
          format: date-time
    UserUpdate:
      type: object
      properties:
        name:
          type: string
        company:
          type: string
        title:
          type: string
        intro:
          type: string
        avatar:
          type: string
    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
          default: bearer
        user:
          $ref: '#/components/schemas/UserResponse'
    BrochureCreate:
      type: object
      required:
      - title
      - pages
      properties:
        title:
          type: string
        cover:
          type: string
        purpose:
          type: string
          enum:
          - partner
          - client
          - investor
          - supplier
        album_meta:
          type: object
        pages:
          type: array
          items:
            $ref: '#/components/schemas/PageSchema'
    BrochureUpdate:
      type: object
      properties:
        title:
          type: string
        cover:
          type: string
        purpose:
          type: string
        album_meta:
          type: object
        pages:
          type: array
          items:
            $ref: '#/components/schemas/PageSchema'
    BrochureResponse:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        title:
          type: string
        cover:
          type: string
        purpose:
          type: string
        status:
          type: string
        share_token:
          type: string
        view_count:
          type: integer
        pages_count:
          type: integer
        album_meta:
          type: object
        pages:
          type: array
          items:
            $ref: '#/components/schemas/PageSchema'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    PageSchema:
      type: object
      properties:
        id:
          type: integer
        sort_order:
          type: integer
        content_type:
          type: string
        content:
          type: string
        image_url:
          type: string
        media_url:
          type: string
        ai_summary:
          type: string
    SmartSearchQuery:
      type: object
      required:
      - query
      properties:
        query:
          type: string
          minLength: 1
          maxLength: 500
        top_k:
          type: integer
          default: 10
        mode:
          type: string
          enum:
          - hybrid
          - vector
          - keyword
          default: hybrid
        min_score:
          type: number
          default: 0.0
    TagInput:
      type: object
      properties:
        tag:
          type: string
        weight:
          type: number
          default: 1.0
    TagBatchInput:
      type: object
      required:
      - tag_type
      - tags
      properties:
        tag_type:
          type: string
          enum:
          - provide
          - need
        source:
          type: string
          default: manual
        tags:
          type: array
          items:
            $ref: '#/components/schemas/TagInput'
    TagResponse:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        tag_type:
          type: string
        tag:
          type: string
        weight:
          type: number
        source:
          type: string
    MatchAction:
      type: object
      required:
      - status
      properties:
        status:
          type: string
          enum:
          - matched
          - interested
          - contacted
          - archived
    MatchResponse:
      type: object
      properties:
        id:
          type: integer
        user_a_id:
          type: integer
        user_b_id:
          type: integer
        match_score:
          type: number
        status:
          type: string
        common_tags:
          type: string
        source:
          type: string
    UnlockRequest:
      type: object
      properties: {}
    UnlockResponse:
      type: object
      properties:
        unlocked:
          type: boolean
        name:
          type: string
        phone:
          type: string
        wechat:
          type: string
        company:
          type: string
        unlock_quota_remaining:
          type: integer
        message:
          type: string
    TrustCreate:
      type: object
      required:
      - trusted_user_id
      properties:
        trusted_user_id:
          type: integer
    TrustResponse:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        trusted_user_id:
          type: integer
        created_at:
          type: string
          format: date-time
    VisitorLogCreate:
      type: object
      properties:
        visitor_id:
          type: string
        visitor_name:
          type: string
        visitor_ip:
          type: string
        source:
          type: string
        page_viewed:
          type: string
        duration:
          type: integer
    VisitorLogResponse:
      type: object
      properties:
        id:
          type: integer
        brochure_id:
          type: integer
        visitor_name:
          type: string
        visitor_ip:
          type: string
        source:
          type: string
        page_viewed:
          type: string
        duration:
          type: integer
        interested:
          type: boolean
        visit_time:
          type: string
          format: date-time
    InterestCreate:
      type: object
      required:
      - visitor_name
      properties:
        visitor_name:
          type: string
        contact_msg:
          type: string
    PaymentCreateOrderRequest:
      type: object
      required:
      - tier
      - channel
      properties:
        tier:
          type: string
          enum:
          - gold
          - diamond
          - board
        channel:
          type: string
          enum:
          - wechat
          - alipay
        openid:
          type: string
    PaymentCreateOrderResponse:
      type: object
      properties:
        order_no:
          type: string
        pay_info:
          type: object
        status:
          type: string
        total_cents:
          type: integer
        total_formatted:
          type: string
    PaymentOrderStatusResponse:
      type: object
      properties:
        order_no:
          type: string
        channel:
          type: string
        channel_order_no:
          type: string
        status:
          type: string
        total_cents:
          type: integer
        tier:
          type: string
        paid_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
    TeamCreate:
      type: object
      required:
      - name
      - slug
      properties:
        name:
          type: string
        slug:
          type: string
          pattern: ^[a-z0-9\-]+$
        description:
          type: string
        logo:
          type: string
        website:
          type: string
        industry:
          type: string
        size:
          type: string
        max_members:
          type: integer
          default: 50
    TeamResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        owner_id:
          type: integer
        max_members:
          type: integer
        is_active:
          type: boolean
    TeamUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        logo:
          type: string
        website:
          type: string
        industry:
          type: string
        size:
          type: string
        max_members:
          type: integer
    MemberResponse:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        name:
          type: string
        avatar:
          type: string
        role:
          type: string
        title_in_team:
          type: string
    RoleUpdate:
      type: object
      required:
      - role
      properties:
        role:
          type: string
          enum:
          - owner
          - admin
          - member
          - viewer
    InviteCreate:
      type: object
      properties:
        email:
          type: string
        phone:
          type: string
