<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI数智名片 — 产品落地页</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
  color: #e2e8f0;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.card {
  max-width: 640px; width: 100%;
  background: rgba(30, 41, 59, 0.8);
  backdrop-filter: blur(16px);
  border-radius: 24px; padding: 48px 40px;
  box-shadow: 0 25px 50px rgba(0,0,0,0.4);
  border: 1px solid rgba(148, 163, 184, 0.15);
}
h1 {
  font-size: 2rem; font-weight: 700; margin-bottom: 8px;
  background: linear-gradient(135deg, #38bdf8, #818cf8);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.subtitle { font-size: 1.1rem; color: #94a3b8; margin-bottom: 24px; }
.tagline { font-size: 1rem; color: #cbd5e1; margin-bottom: 32px; }
.section-title {
  font-size: 0.85rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.05em; color: #64748b; margin-bottom: 12px;
}
.sell-points { display: flex; flex-direction: column; gap: 10px; margin-bottom: 32px; }
.sell-point {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px 16px; background: rgba(148, 163, 184, 0.08);
  border-radius: 12px;
}
.sell-point .icon { font-size: 1.2rem; flex-shrink: 0; }
.sell-point .text { font-size: 0.95rem; color: #cbd5e1; }
.customer-match {
  display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 32px;
}
.customer-tag {
  display: inline-block; padding: 6px 14px;
  background: rgba(56, 189, 248, 0.12);
  border: 1px solid rgba(56, 189, 248, 0.25);
  border-radius: 20px; font-size: 0.85rem; color: #7dd3fc;
}
.cta {
  display: block; width: 100%; padding: 16px;
  background: linear-gradient(135deg, #3b82f6, #6366f1);
  color: #fff; font-size: 1.1rem; font-weight: 600;
  border: none; border-radius: 12px; cursor: pointer;
  text-align: center; transition: transform 0.15s, box-shadow 0.15s;
}
.cta:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(59, 130, 246, 0.35); }
.footer {
  margin-top: 32px; padding-top: 24px;
  border-top: 1px solid rgba(148, 163, 184, 0.15);
  font-size: 0.85rem; color: #64748b;
}
.footer strong { color: #94a3b8; }
.economics { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
.econ-item { background: rgba(148, 163, 184, 0.06); padding: 8px 12px; border-radius: 8px; }
.econ-label { font-size: 0.75rem; color: #64748b; }
.econ-value { font-size: 0.95rem; font-weight: 600; color: #e2e8f0; }
</style>
</head>
<body>
<div class="card">
  <h1>AI数智名片</h1>
  <p class="subtitle">AI精准匹配B2B客户</p>
  <p class="tagline">为您的业务量身打造，立即体验指数级增长</p>

  <div class="section-title">✨ 核心价值</div>
  <div class="sell-points">
    <div class="sell-point"><span class="icon">⚡</span><span class="text">自动化效率提升</span></div>
    <div class="sell-point"><span class="icon">🎯</span><span class="text">数据驱动决策</span></div>
    <div class="sell-point"><span class="icon">🚀</span><span class="text">持续迭代优化</span></div>
  </div>

  <div class="section-title">👥 适用人群</div>
  <div class="customer-match">
    <span class="customer-tag">👤 中小企业</span>
  </div>

  <button class="cta" onclick="alert('🎉 感谢您的关注！产品即将上线，敬请期待。')">立即预约体验 →</button>

  <div class="footer">
    <strong>📊 单元经济摘要</strong>
    <div class="economics">

    </div>
  </div>
</div>
</body>
</html>
