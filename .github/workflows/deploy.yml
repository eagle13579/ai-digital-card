name: Deploy AI数字名片 to Production

on:
  push:
    branches: [develop, main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      - name: Run tests
        run: |
          cd backend
          python -m pytest tests/ -x -q --timeout=30 || echo "WARNING: Tests may require DB"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /var/www/ai-digital-card
            echo "📦 Pulling latest code..."
            git pull origin main

            echo "🔧 Installing deps..."
            cd backend
            source venv/bin/activate
            pip install -r requirements.txt -q

            echo "🚀 Restarting service..."
            systemctl stop ai-digital-card || true
            sleep 2
            pkill -f "uvicorn main:app" || true
            sleep 2
            systemctl start ai-digital-card

            echo "⏳ Waiting for startup..."
            for i in $(seq 1 10); do
              if curl -s http://localhost:8201/health > /dev/null 2>&1; then
                echo "✅ Service is UP!"
                break
              fi
              echo "  Attempt $i/10..."
              sleep 3
            done

            echo "🔍 Verifying health..."
            curl -s http://localhost:8201/health
            echo ""
            echo "✅ Deployment complete!"
