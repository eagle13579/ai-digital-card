# ───────────────────────────────────────────────────────
# AI数智名片 — 自动回滚 CI 工作流
# 输入: environment + 目标commit/镜像 → git revert → 构建 → 部署 → 健康检查 → 失败自动回退
# ───────────────────────────────────────────────────────
name: Rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "回滚目标环境"
        required: true
        default: production
        type: choice
        options:
          - production
          - canary
      target_tag:
        description: "Docker 镜像标签（直接使用已有镜像回滚，与commit二选一）"
        required: false
        type: string
      commit:
        description: "Git commit hash（回滚到此commit并重新构建镜像，与target_tag二选一）"
        required: false
        type: string
      skip_health_check:
        description: "跳过健康检查（紧急回滚时使用）"
        required: false
        default: false
        type: boolean

concurrency:
  group: rollback-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ${{ github.repository }}/backend
  DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
  DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
  DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}

jobs:
  # ────────────────────────────────────────────────────
  # Job 1: 验证输入 + 确定回滚目标
  # ────────────────────────────────────────────────────
  resolve-target:
    name: Resolve Rollback Target
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      image_tag: ${{ steps.resolve.outputs.tag }}
      image_full: ${{ steps.resolve.outputs.full }}
      action: ${{ steps.resolve.outputs.action }}
      commit: ${{ steps.resolve.outputs.commit }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: resolve
        run: |
          TAG="${{ inputs.target_tag }}"
          COMMIT="${{ inputs.commit }}"
          ENV="${{ inputs.environment }}"
          if [[ -n "$TAG" ]]; then
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "full=${REGISTRY}/${IMAGE_BACKEND}:${TAG}" >> "$GITHUB_OUTPUT"
            echo "action=deploy-only" >> "$GITHUB_OUTPUT"
            echo "✅ 使用已有镜像: ${TAG}"
            exit 0
          fi
          if [[ -z "$COMMIT" ]]; then
            PREV=$(git log --oneline --first-parent --format="%H" | sed -n '2p')
            if [[ -z "$PREV" ]]; then
              echo "❌ 未找到上一个commit，请显式指定 commit 或 target_tag"
              exit 1
            fi
            COMMIT="$PREV"
            echo "ℹ️  自动选择上一个commit: ${COMMIT::8}"
          fi
          TS=$(date +%s)
          echo "tag=rollback-${COMMIT::8}-${TS}" >> "$GITHUB_OUTPUT"
          echo "full=${REGISTRY}/${IMAGE_BACKEND}:rollback-${COMMIT::8}-${TS}" >> "$GITHUB_OUTPUT"
          echo "action=git-revert-and-build" >> "$GITHUB_OUTPUT"
          echo "commit=${COMMIT}" >> "$GITHUB_OUTPUT"
          echo "✅ 回滚目标: commit=${COMMIT::8}, 环境=${ENV}"

  # ────────────────────────────────────────────────────
  # Job 2: Git revert + 构建镜像
  # ────────────────────────────────────────────────────
  revert-and-build:
    name: Git Revert & Build Image
    needs: resolve-target
    if: needs.resolve-target.outputs.action == 'git-revert-and-build'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Git revert to target commit
        run: |
          TARGET="${{ needs.resolve-target.outputs.commit }}"
          echo "🔙 开始 revert: HEAD → ${TARGET::8}"
          git cat-file -e "${TARGET}" 2>/dev/null || { echo "❌ commit ${TARGET::8} 不存在"; exit 1; }
          git revert --no-commit "${TARGET}..HEAD" 2>/dev/null || {
            echo "⚠️ revert 产生冲突，改用 git reset --soft"
            git reset --soft "${TARGET}"
          }
          cat > /tmp/rollback_msg.txt <<- EOF
          rollback: revert to ${TARGET::8}
          Automated rollback via GitHub Actions.
          Commit: ${TARGET}
          Environment: ${{ inputs.environment || 'production' }}
          Actor: ${{ github.actor }}
          EOF
          git commit -F /tmp/rollback_msg.txt
          git push origin HEAD:${{ github.ref }}
          echo "✅ Revert commit 已推送"
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push rollback image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: ${{ needs.resolve-target.outputs.image_full }}
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=rollback
            rollback.from=${{ needs.resolve-target.outputs.commit }}

  # ────────────────────────────────────────────────────
  # Job 3: 部署回滚镜像到目标环境
  # ────────────────────────────────────────────────────
  deploy-rollback:
    name: Deploy Rollback
    needs: [resolve-target, revert-and-build]
    if: always() && needs.resolve-target.result == 'success'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'production' }}
    steps:
      - name: Deploy via SSH (appleboy)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ env.DEPLOY_KEY }}
          script: |
            set -e
            cd /opt/ai-digital-card

            IMAGE="${{ needs.resolve-target.outputs.image_full }}"
            ENV="${{ inputs.environment || 'production' }}"

            echo "🚀 回滚部署开始 - 镜像: ${IMAGE} - 环境: ${ENV}"

            # 1. 保存当前版本状态（用于失败后恢复）
            mkdir -p deploy/rollback
            docker inspect ai-digital-card-backend \
              --format '{{.Config.Image}}' \
              2>/dev/null > deploy/rollback/pre_rollback_image.txt || true

            # 2. 拉取回滚镜像
            echo "📥 拉取回滚镜像..."
            docker pull "${IMAGE}"

            # 3. 更新 compose 文件中的镜像引用
            echo "🔄 更新 docker-compose.yml..."
            sed -i.bak "s|image: .*backend.*|image: ${IMAGE}|g" docker-compose.yml

            # 4. 重启服务
            echo "🔁 重启服务..."
            docker compose up -d --remove-orphans

            # 5. 清理旧镜像
            docker image prune -f

            echo "✅ 回滚镜像已部署"

      - name: Health check (60s timeout)
        if: ${{ !inputs.skip_health_check }}
        run: |
          END=$((SECONDS+60))
          HEALTHY=false
          HOST="${DEPLOY_HOST}"
          PORT=8201
          echo "🏥 健康检查中 (60s 超时)..."
          while [ $SECONDS -lt $END ]; do
            if curl -sf "http://${HOST}:${PORT}/health" >/dev/null 2>&1; then
              HEALTHY=true
              echo "✅ 健康检查通过！回滚成功"
              break
            fi
            echo "⏳ 等待服务就绪... ($((END-SECONDS))s 剩余)"
            sleep 5
          done
          if [ "$HEALTHY" != "true" ]; then
            echo "❌ 健康检查失败 — 将触发自动恢复"
            exit 1
          fi

  # ────────────────────────────────────────────────────
  # Job 4: 健康检查失败时自动恢复（回滚回滚）
  # ────────────────────────────────────────────────────
  auto-recover:
    name: Auto-Recover
    needs: [resolve-target, deploy-rollback]
    if: failure() && needs.deploy-rollback.result == 'failure'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'production' }}
    steps:
      - name: Revert to previous stable version
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ env.DEPLOY_KEY }}
          script: |
            set -e
            cd /opt/ai-digital-card
            STATE_FILE="deploy/rollback/pre_rollback_image.txt"
            echo "⚠️ 回滚后健康检查失败，自动恢复中..."
            if [[ -f "$STATE_FILE" ]]; then
              PREV_IMAGE=$(cat "$STATE_FILE")
              echo "📥 恢复到上一个稳定镜像: ${PREV_IMAGE}"
              docker pull "${PREV_IMAGE}" 2>/dev/null || true
              sed -i.bak "s|image: .*backend.*|image: ${PREV_IMAGE}|g" docker-compose.yml
              docker compose up -d --remove-orphans
              echo "✅ 已恢复到上一个版本"
            else
              echo "⚠️ 无此前状态记录，docker compose 直接重启..."
              docker compose up -d --remove-orphans
            fi
            sleep 10
            if curl -sf http://localhost:8201/health >/dev/null 2>&1; then
              echo "✅ 恢复后健康检查通过"
            else
              echo "❌ 恢复后仍然不健康 — 请手动处理 (参考 docs/ops/ROLLBACK.md)"
            fi
      - name: Send failure notification
        uses: actions/github-script@v7
        with:
          script: |
            const env = '${{ inputs.environment || 'production' }}';
            const commit = '${{ inputs.commit || 'auto' }}';
            core.summary.addHeading('❌ 回滚失败 — 已自动恢复');
            core.summary.addTable([
              [{data: '项目', header: true}, {data: '值', header: true}],
              ['环境', env],
              ['目标', commit.slice(0, 8)],
              ['触发者', context.actor],
              ['工作流', `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`]
            ]);
            core.summary.write();
