# ──────────────────────────────────────────────
# Security Scan 流水线 — 静态安全扫描 + 依赖审计
# 每次 push 到 main 时触发 + 每周一 UTC 08:00 定时运行
# 仅报告不阻塞 (continue-on-error: true)
# ──────────────────────────────────────────────
name: Security Scan

on:
  push:
    branches: [main]
  schedule:
    # 每周一 UTC 08:00 运行 (北京时间 16:00)
    - cron: '0 8 * * 1'
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  bandit:
    name: Static Analysis (Bandit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    # 仅报告结果，不阻塞 CI 通过/失败
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit scan
        run: |
          bandit -r . -ll -f custom \
            --msg-template '{abspath}:{line} {severity}:{test_id}:{msg}' \
            2>&1 | tee bandit-report.txt || true

      - name: Count findings
        run: |
          HIGH=$(grep -c 'HIGH:' bandit-report.txt 2>/dev/null || echo 0)
          MEDIUM=$(grep -c 'MEDIUM:' bandit-report.txt 2>/dev/null || echo 0)
          LOW=$(grep -c 'LOW:' bandit-report.txt 2>/dev/null || echo 0)
          echo "╔══════════════════════════════════════╗"
          echo "║        Bandit 扫描结果汇总            ║"
          echo "╠══════════════════════════════════════╣"
          echo "║  高危 (HIGH):   ${HIGH:-0}                           ║"
          echo "║  中危 (MEDIUM): ${MEDIUM:-0}                         ║"
          echo "║  低危 (LOW):    ${LOW:-0}                           ║"
          echo "╚══════════════════════════════════════╝"

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: backend/bandit-report.txt
          retention-days: 30

  dependency-audit:
    name: Dependency Audit (pip-audit + Safety)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install pip-audit and Safety
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit safety

      - name: Run pip-audit
        run: |
          echo "───────────────────────────────────────"
          echo "  pip-audit 依赖安全扫描"
          echo "───────────────────────────────────────"
          pip-audit -r requirements.txt \
            --desc on \
            --format columns \
            2>&1 | tee pip-audit-report.txt || true

      - name: Run Safety check
        run: |
          echo "───────────────────────────────────────"
          echo "  Safety 已知漏洞数据库检查"
          echo "───────────────────────────────────────"
          safety check -r requirements.txt \
            --full-report \
            2>&1 | tee safety-report.txt || true

      - name: Summarize findings
        run: |
          PIP_VULN=$(grep -c 'CVE-\|GHSA-\|PYSEC-' pip-audit-report.txt 2>/dev/null || echo 0)
          SAFETY_VULN=$(grep -c 'CVE-\|GHSA-\|PYSEC-' safety-report.txt 2>/dev/null || echo 0)
          echo "╔══════════════════════════════════════╗"
          echo "║     依赖审计扫描结果汇总              ║"
          echo "╠══════════════════════════════════════╣"
          echo "║  pip-audit 发现漏洞: ${PIP_VULN:-0}                  ║"
          echo "║  Safety   发现漏洞: ${SAFETY_VULN:-0}                 ║"
          echo "╚══════════════════════════════════════╝"

      - name: Upload dependency audit reports
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit-reports
          path: |
            backend/pip-audit-report.txt
            backend/safety-report.txt
          retention-days: 30

  # ── 汇总 Job: 将安全扫描结果汇总到 CI 摘要 ──
  security-summary:
    name: Security Scan Summary
    needs: [bandit, dependency-audit]
    if: always()
    runs-on: ubuntu-latest

    continue-on-error: true

    steps:
      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: reports/
          merge-multiple: true

      - name: Generate CI summary
        run: |
          echo "## 🛡️ 安全扫描结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Bandit 静态分析" >> $GITHUB_STEP_SUMMARY
          if [ -f reports/bandit-report.txt ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat reports/bandit-report.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ 无 Bandit 报告" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### pip-audit 依赖审计" >> $GITHUB_STEP_SUMMARY
          if [ -f reports/pip-audit-report.txt ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            head -100 reports/pip-audit-report.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ 无 pip-audit 报告" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Safety 检查" >> $GITHUB_STEP_SUMMARY
          if [ -f reports/safety-report.txt ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            head -100 reports/safety-report.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ 无 Safety 报告" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> ⚠️  安全扫描不会阻塞 CI 构建，仅做信息参考。" >> $GITHUB_STEP_SUMMARY
          echo "> 严重漏洞 (CVSS >= 9.0) 需在 24 小时内修复。" >> $GITHUB_STEP_SUMMARY
