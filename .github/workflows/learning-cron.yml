# ──────────────────────────────────────────────
# 在线学习 cron 定时器 — 每天凌晨2点自动触发学习
# ──────────────────────────────────────────────
name: Learning Cron

on:
  schedule:
    # 每天 UTC 时间 02:00 (北京时间 10:00 / 夏令时 09:00)
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: '强制学习 (忽略阈值)'
        type: boolean
        default: false

concurrency:
  group: learning-cron-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.12"

jobs:
  check-and-learn:
    name: Online Learning Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run online learning check
        id: learning
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          if [[ "${{ github.event.inputs.force }}" == "true" ]]; then
            echo "⚡ 强制学习模式"
            python -m app.ai.cron.learning_cron --force
          else
            echo "🔍 常规检查模式"
            python -m app.ai.cron.learning_cron --once
          fi

      - name: Check learning result
        if: failure()
        run: |
          echo "❌ 在线学习脚本执行失败，请检查日志"
          exit 1

      - name: Log completion
        run: echo "✅ 在线学习 cron 执行完成"
