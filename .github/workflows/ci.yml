name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  WORKING_DIR: backend

jobs:
  # ── Job 1: Lint ──────────────────────────────────────────────────────
  lint:
    name: Lint (pyflakes/flake8)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ${{ env.WORKING_DIR }}/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pyflakes
          pip install -r requirements.txt

      - name: Run flake8 linting
        run: |
          flake8 app/ --count --statistics --show-source --max-line-length=120
          flake8 tests/ --count --statistics --show-source --max-line-length=120

  # ── Job 2: Test (pytest + coverage) ─────────────────────────────────
  test:
    name: Test (pytest + coverage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ${{ env.WORKING_DIR }}/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio httpx
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:coverage_html \
            -v

      - name: Upload coverage report (XML)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: ${{ env.WORKING_DIR }}/coverage.xml
          retention-days: 7

      - name: Upload coverage report (HTML)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-html
          path: ${{ env.WORKING_DIR }}/coverage_html/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            ${{ env.WORKING_DIR }}/.pytest_cache/
            ${{ env.WORKING_DIR }}/coverage.xml
          retention-days: 7

  # ── Job 3: Build (Docker build verification) ────────────────────────
  build:
    name: Build (Docker)
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (verification only)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ env.WORKING_DIR }}/Dockerfile
          push: false
          load: true
          tags: ai-digital-card:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image was built
        run: |
          echo "✅ Docker image built successfully: ai-digital-card:ci-${{ github.sha }}"
          docker images --filter "reference=ai-digital-card:ci-${{ github.sha }}"

      - name: Quick smoke test (run container and health check)
        run: |
          docker run -d \
            --name ci-smoke-test \
            -p 8003:8003 \
            ai-digital-card:ci-${{ github.sha }}
          # Wait for startup
          sleep 5
          # Health check
          curl -sSf http://localhost:8003/health || (echo "❌ Health check failed" && exit 1)
          echo "✅ Container health check passed"
          docker stop ci-smoke-test
          docker rm ci-smoke-test

  # ── Job 4: Deploy (Docker Hub push, main branch only) ──────────────
  deploy:
    name: Deploy (Docker Hub)
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ai-digital-card:latest
            ${{ secrets.DOCKER_USERNAME }}/ai-digital-card:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "✅ Published ${{ secrets.DOCKER_USERNAME }}/ai-digital-card:${{ github.sha }}"
