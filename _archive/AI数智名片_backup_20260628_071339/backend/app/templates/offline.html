<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>离线 · AI数字名片</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { background: #0f172a; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.offline-card { background: linear-gradient(135deg, #1e293b, #0f172a); border: 1px solid #334155; }
</style>
</head>
<body>
<div class="offline-card rounded-2xl p-8 text-center max-w-md mx-4">
  <div class="w-20 h-20 mx-auto mb-6 rounded-full bg-slate-800 flex items-center justify-center">
    <svg class="w-10 h-10 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636a9 9 0 010 12.728m-2.829-2.829a5 5 0 000-7.07m-4.243 4.243a1 1 0 010-1.414M12 12h.01"/>
    </svg>
  </div>
  <h1 class="text-2xl font-bold text-white mb-2">网络已断开</h1>
  <p class="text-slate-400 mb-8">你正在查看已缓存的离线内容</p>
  <div id="cached-list" class="text-left space-y-2 mb-8">
    <p class="text-sm text-slate-500">已缓存的内容将在恢复网络后同步更新</p>
  </div>
  <button onclick="window.location.reload()" class="w-full py-3 rounded-xl bg-blue-600 hover:bg-blue-500 text-white font-medium transition">
    重新连接
  </button>
</div>
<script>
if ('caches' in window) {
  caches.open('ai-business-card-v1').then(cache => {
    cache.keys().then(requests => {
      const list = document.getElementById('cached-list');
      const items = requests.filter(r => r.url.startsWith(location.origin)).slice(0, 10);
      if (items.length > 0) {
        list.innerHTML = '<p class="text-sm text-slate-400 mb-2">已缓存页面：</p>' +
          items.map(r => `<p class="text-xs text-slate-500 truncate">✅ ${r.url.replace(location.origin, '')}</p>`).join('');
      }
    });
  });
}
</script>
</body>
</html>
