version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-digital-card-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: digital_brochure
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai-digital-card-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-digital-card-backend
    ports:
      - "8201:8201"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/digital_brochure
      - JWT_SECRET=${JWT_SECRET:?请设置 JWT_SECRET 环境变量 — 256 位随机密钥}
      - CORS_ORIGINS=https://liankebao.top,https://api.liankebao.top
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./backend/data:/app/data
      - ./backend/uploads:/app/uploads
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8201/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: ai-digital-card-nginx
    ports:
      - "8200:8200"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/var/www/ai-digital-card/frontend/dist:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
