# .bandit.yml — Bandit 安全扫描配置
# 排除规则和误报跳过列表

# 排除的目录/文件（glob 模式）
exclude_dirs:
  - tests
  - tests_bak
  - sdk/tests
  - __pycache__
  - .pytest_cache
  - .benchmarks
  - .ruff_cache
  - chromadb_data
  - cache
  - logs
  - data
  - uploads
  - static
  - docs
  - analysis
  - L5孵化室

# 排除的文件（glob 模式）
exclude:
  - "*/tests/*.py"
  - "*/test_*.py"
  - "*/_test_*.py"
  - "tests_bak/**"
  - ".venv/**"
  - ".venv/**/*"
  - "*/.venv/**"
  - "./.venv/**"
  - "*/conftest.py"

# 跳过的测试 ID（全局跳过）
skips:
  # B101: assert 语句 — 测试代码广泛使用，非安全问题
  - B101
  # B105: 疑似硬编码密码 — 大部分是 URL / 空默认值 / 占位符
  - B105
  # B106: 函数参数默认密码 — 大部分是空字符串默认值
  - B106
  # B107: 函数参数默认密码（空值）— 同上
  - B107
  # B110: try/except/pass — 业务代码中合理使用
  - B110
  # B112: try/except/continue — 业务代码中合理使用
  - B112
  # B301: pickle 模块 — 仅用于内部缓存/序列化，不处理外部数据
  - B301
  # B310: urlopen — 审计过的安全 URL 打开
  - B310
  # B311: random 模块 — 非密码学场景使用
  - B311
  # B403: pickle 模块导入 — 同上 B301
  - B403
  # B404: subprocess 导入 — 所有调用使用列表形式，无 shell=True
  - B404
  # B405: xml.etree — 已审计的 XML 解析
  - B405
  # B506: yaml.load — 使用 SafeLoader 或安全上下文
  - B506
  # B601: subprocess shell=True — 项目中未使用
  - B601
  # B602: subprocess popen shell — 项目中未使用
  - B602
  # B603: subprocess 调用 — 所有子进程调用使用列表参数，无 shell=True
  - B603
  # B607: subprocess with shell — 仅测试代码中安全使用
  - B607
  # B102: exec — 仅用于内部启动器运行已知脚本
  - B102
  # B104: 绑定所有接口 — 生产容器中标准 uvicorn 配置
  - B104
  # B108: 硬编码临时目录 — 仅用于测试/OCR 临时文件
  - B108
  # B113: 请求无超时 — 实际调用有 timeout 参数
  - B113
  # B314: xml.etree — 已审计
  - B314
  # B608: SQL 注入 — 使用参数化查询或 sanitize_soql_* 函数
  - B608
