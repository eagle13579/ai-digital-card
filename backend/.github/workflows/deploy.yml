# ── AI数字名片 自动部署流水线 ──────────────────────────────────────────
# 触发条件：push 到 main 分支
#
# 注意：以下部署步骤使用 SSH 占位符。
# 向海容需要：
#   1. 在 GitHub Secrets 中添加以下密钥：
#      - DEPLOY_HOST     — 服务器 IP 或域名
#      - DEPLOY_USER     — SSH 用户名
#      - DEPLOY_SSH_KEY  — SSH 私钥（Base64 encoded）
#      - DEPLOY_PATH     — 服务器上的部署路径
#   2. 将服务器的公钥添加到 ~/.ssh/authorized_keys
#
# 部署方式：rsync 同步代码 + systemd 重启服务

name: Deploy

on:
  push:
    branches: [main]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: 📥 Checkout 代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: 📦 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔍 代码风格检查 (ruff)
        run: |
          python -m ruff check app/ tests/ main.py

      - name: 🧪 运行测试 (pytest)
        run: |
          python -m pytest tests/ -v --tb=short -x

