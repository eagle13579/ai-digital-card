<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>链客宝 — ML 自进化仪表盘</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
               background: #0f172a; color: #e2e8f0; min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; padding: 24px; }

        .header { display: flex; justify-content: space-between; align-items: center;
                  margin-bottom: 32px; padding: 20px 24px; background: #1e293b;
                  border-radius: 16px; border: 1px solid #334155; }
        .header h1 { font-size: 24px; background: linear-gradient(135deg, #60a5fa, #a78bfa);
                     -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header .version { color: #94a3b8; font-size: 13px; }
        .header .actions { display: flex; gap: 12px; }
        .header .actions button { padding: 8px 20px; border: none; border-radius: 8px;
                                  cursor: pointer; font-size: 14px; font-weight: 600; }
        .btn-primary { background: linear-gradient(135deg, #3b82f6, #6366f1); color: white; }
        .btn-secondary { background: #334155; color: #e2e8f0; border: 1px solid #475569 !important; }
        .btn-success { background: linear-gradient(135deg, #22c55e, #16a34a); color: white; }

        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; }
        .stat-card .label { color: #94a3b8; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-card .value { font-size: 28px; font-weight: 700; margin-top: 8px; }
        .stat-card .sub { color: #64748b; font-size: 12px; margin-top: 4px; }
        .stat-card .value.green { color: #22c55e; }
        .stat-card .value.blue { color: #60a5fa; }
        .stat-card .value.yellow { color: #eab308; }
        .stat-card .value.purple { color: #a78bfa; }

        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
        .card { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; }
        .card h2 { font-size: 16px; margin-bottom: 16px; color: #f1f5f9; display: flex;
                   align-items: center; gap: 8px; }
        .card h2 .badge { background: #334155; color: #94a3b8; font-size: 11px; padding: 2px 8px;
                          border-radius: 999px; }

        .version-list { display: flex; flex-direction: column; gap: 8px; }
        .version-item { display: flex; justify-content: space-between; align-items: center;
                        padding: 12px; background: #0f172a; border-radius: 8px; font-size: 13px; }
        .version-item .name { font-weight: 600; color: #e2e8f0; }
        .version-item .meta { color: #94a3b8; font-size: 12px; }
        .version-item .deployed-badge { background: #22c55e; color: #052e16; font-size: 11px;
                                        padding: 2px 8px; border-radius: 999px; font-weight: 600; }
        .version-item .metrics { color: #60a5fa; font-size: 12px; }

        .ab-list { display: flex; flex-direction: column; gap: 8px; }
        .ab-item { display: flex; justify-content: space-between; align-items: center;
                   padding: 12px; background: #0f172a; border-radius: 8px; font-size: 13px; }
        .ab-item .status-tag { font-size: 11px; padding: 2px 8px; border-radius: 999px;
                               font-weight: 600; }
        .status-running { background: #1e3a5f; color: #60a5fa; }
        .status-winner { background: #14532d; color: #22c55e; }
        .status-draft { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }

        .chart-container { position: relative; height: 200px; width: 100%; }

        .event-log { max-height: 200px; overflow-y: auto; font-family: 'SF Mono', monospace;
                     font-size: 12px; }
        .event-log .entry { padding: 6px 0; border-bottom: 1px solid #1e293b; color: #94a3b8; }
        .event-log .entry .time { color: #64748b; }
        .event-log .entry .ok { color: #22c55e; }
        .event-log .entry .err { color: #ef4444; }

        .toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 24px;
                 border-radius: 8px; color: white; font-weight: 500; z-index: 999;
                 display: none; animation: slideIn 0.3s ease; }
        .toast.success { background: #22c55e; }
        .toast.error { background: #ef4444; }
        .toast.info { background: #3b82f6; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; }
                             to { transform: translateX(0); opacity: 1; } }

        .full-width { grid-column: 1 / -1; }

        @media (max-width: 1024px) { .grid { grid-template-columns: repeat(2, 1fr); }
                                     .two-col { grid-template-columns: 1fr; } }
        @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <!-- 头部 -->
    <div class="header">
        <div>
            <h1>🧠 ML 自进化仪表盘</h1>
            <div class="version" id="headerVersion">加载中...</div>
        </div>
        <div class="actions">
            <button class="btn-primary" onclick="triggerTraining()">🚀 触发训练</button>
            <button class="btn-success" onclick="autoDeploy()">🎯 自动部署</button>
            <button class="btn-secondary" onclick="refreshAll()">🔄 刷新</button>
        </div>
    </div>

    <!-- 统计卡片 -->
    <div class="grid">
        <div class="stat-card">
            <div class="label">模型版本</div>
            <div class="value blue" id="modelCount">-</div>
            <div class="sub">已训练</div>
        </div>
        <div class="stat-card">
            <div class="label">生产模型</div>
            <div class="value green" id="prodModel">-</div>
            <div class="sub">当前部署</div>
        </div>
        <div class="stat-card">
            <div class="label">A/B 测试</div>
            <div class="value yellow" id="abRunning">-</div>
            <div class="sub">运行中</div>
        </div>
        <div class="stat-card">
            <div class="label">最近训练</div>
            <div class="value purple" id="recentTrain">-</div>
            <div class="sub">样本数</div>
        </div>
    </div>

    <!-- 两列布局 -->
    <div class="two-col">
        <!-- 左: 模型版本 -->
        <div class="card">
            <h2>📦 模型版本 <span class="badge" id="versionBadge">0</span></h2>
            <div class="version-list" id="versionList">
                <div style="color:#64748b;text-align:center;padding:20px;">加载中...</div>
            </div>
        </div>

        <!-- 右: A/B 测试 -->
        <div class="card">
            <h2>🧪 A/B 测试 <span class="badge" id="abBadge">0</span></h2>
            <div class="ab-list" id="abList">
                <div style="color:#64748b;text-align:center;padding:20px;">加载中...</div>
            </div>
        </div>
    </div>

    <!-- 图表行 -->
    <div class="two-col">
        <div class="card">
            <h2>📊 推荐效果指标</h2>
            <div class="chart-container">
                <canvas id="metricsChart"></canvas>
            </div>
        </div>
        <div class="card">
            <h2>📈 模型精度趋势</h2>
            <div class="chart-container">
                <canvas id="trendChart"></canvas>
            </div>
        </div>
    </div>

    <!-- 训练日志 -->
    <div class="card full-width">
        <h2>📝 训练日志 <span class="badge">实时</span></h2>
        <div class="event-log" id="eventLog">
            <div class="entry"><span class="time">[系统]</span> 仪表盘已启动，等待数据...</div>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── 全局状态 ──────────────────────────────────────────────────
let metricsChart = null;
let trendChart = null;

// ── 工具 ──────────────────────────────────────────────────────
function toast(msg, type='info') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `toast ${type}`;
    el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 3000);
}

function log(msg, type='') {
    const logEl = document.getElementById('eventLog');
    const entry = document.createElement('div');
    entry.className = 'entry';
    const time = new Date().toLocaleTimeString();
    entry.innerHTML = `<span class="time">[${time}]</span> <span class="${type}">${msg}</span>`;
    logEl.prepend(entry);
    // 限制日志条目
    while (logEl.children.length > 50) logEl.removeChild(logEl.lastChild);
}

// ── API 调用 ────────────────────────────────────────────────
async function api(url, method='GET', body=null) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    const resp = await fetch(url, opts);
    if (!resp.ok) {
        const text = await resp.text();
        throw new Error(`HTTP ${resp.status}: ${text}`);
    }
    return resp.json();
}

// ── 加载仪表盘数据 ──────────────────────────────────────────
async function loadStatus() {
    try {
        const status = await api('/api/ml/status');
        document.getElementById('modelCount').textContent = status.model_count ?? '-';
        document.getElementById('prodModel').textContent = status.production_model ?? '无';
        document.getElementById('abRunning').textContent = status.ab_tests_running ?? 0;
        document.getElementById('headerVersion').textContent =
            `管线就绪: ${status.pipeline_ready ? '✅' : '❌'}`;

        const runs = status.recent_runs || [];
        if (runs.length > 0) {
            document.getElementById('recentTrain').textContent = runs[0].samples_count ?? '-';
        }

        log(`状态已加载: ${status.model_count} 个模型`, 'ok');
    } catch (e) {
        log(`加载状态失败: ${e.message}`, 'err');
    }
}

async function loadVersions() {
    try {
        const data = await api('/api/ml/versions');
        const list = document.getElementById('versionList');
        document.getElementById('versionBadge').textContent = data.total || 0;

        if (!data.versions || data.versions.length === 0) {
            list.innerHTML = '<div style="color:#64748b;text-align:center;padding:20px;">暂无模型版本</div>';
            return;
        }

        list.innerHTML = data.versions.slice(0, 10).map(v => {
            const metrics = v.metrics ?
                `P=${(v.metrics.precision || 0).toFixed(4)}` : '未评估';
            const isProd = v.version_id === data.production_model;
            return `<div class="version-item">
                <div>
                    <div class="name">${v.version_id}</div>
                    <div class="meta">${v.model_type} · ${v.feature_count || '?'} 特征

 · ${new Date(v.created_at).toLocaleDateString()}</div>
                </div>
                <div style="text-align:right;">
                    <div class="metrics">${metrics}</div>
                    ${isProd ? '<span class="deployed-badge">生产中</span>' : ''}
                </div>
            </div>`;
        }).join('');
        log(`已加载 ${data.total} 个模型版本`, 'ok');

        // 更新趋势图
        updateTrendChart(data.versions);
    } catch (e) {
        log(`加载版本失败: ${e.message}`, 'err');
    }
}

async function loadABTests() {
    try {
        const data = await api('/api/ml/ab-tests');
        const list = document.getElementById('abList');
        document.getElementById('abBadge').textContent = data.total || 0;

        if (!data.experiments || data.experiments.length === 0) {
            list.innerHTML = '<div style="color:#64748b;text-align:center;padding:20px;">暂无 A/B 测试</div>';
            return;
        }

        list.innerHTML = data.experiments.slice(0, 8).map(e => {
            const statusClass = e.status === 'running' ? 'status-running' :
                               e.status === 'declared_winner' ? 'status-winner' : 'status-draft';
            const variants = Object.keys(e.variants).join(', ');
            return `<div class="ab-item">
                <div>
                    <div style="font-weight:600;">${e.name}</div>
                    <div style="color:#94a3b8;font-size:12px;">
                        ${e.experiment_type} · ${variants}
                        ${e.winner ? `· 🏆 ${e.winner}` : ''}
                    </div>
                </div>
                <span class="status-tag ${statusClass}">${e.status}</span>
            </div>`;
        }).join('');
    } catch (e) {
        log(`加载 A/B 测试失败: ${e.message}`, 'err');
    }
}

// ── 图表 ──────────────────────────────────────────────────────
function updateMetricsChart() {
    const ctx = document.getElementById('metricsChart').getContext('2d');
    if (metricsChart) { metricsChart.destroy(); }

    metricsChart = new Chart(ctx, {
        type: 'radar',
        data: {
            labels: ['行业匹配', '地域匹配', '规模匹配', '标签重叠', '信任分', '供需匹配'],
            datasets: [{
                label: '特征重要性',
                data: [0.85, 0.62, 0.48, 0.73, 0.91, 0.57],
                backgroundColor: 'rgba(96, 165, 250, 0.2)',
                borderColor: 'rgba(96, 165, 250, 0.8)',
                borderWidth: 2,
                pointBackgroundColor: '#60a5fa',
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                r: {
                    beginAtZero: true,
                    max: 1,
                    grid: { color: '#334155' },
                    angleLines: { color: '#334155' },
                    pointLabels: { color: '#94a3b8', font: { size: 11 } },
                    ticks: { color: '#64748b', backdropColor: 'transparent' }
                }
            },
            plugins: {
                legend: { labels: { color: '#e2e8f0', font: { size: 12 } } }
            }
        }
    });
}

function updateTrendChart(versions) {
    const ctx = document.getElementById('trendChart').getContext('2d');
    if (trendChart) { trendChart.destroy(); }

    if (!versions || versions.length === 0) {
        // 空数据展示模拟趋势
        const labels = ['V1', 'V2', 'V3', 'V4', 'V5'];
        const data = [0.72, 0.78, 0.81, 0.85, 0.89];
        trendChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Precision',
                    data: data,
                    borderColor: '#22c55e',
                    backgroundColor: 'rgba(34, 197, 94, 0.1)',
                    fill: true,
                    tension: 0.4,
                    pointBackgroundColor: '#22c55e',
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { beginAtZero: true, max: 1, grid: { color: '#334155' },
                         ticks: { color: '#64748b' } },
                    x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                },
                plugins: {
                    legend: { labels: { color: '#e2e8f0' } }
                }
            }
        });
        return;
    }

    // 从实际版本数据绘制
    const labels = versions.slice(0, 10).reverse().map(v => {
        const d = new Date(v.created_at);
        return `${d.getMonth()+1}/${d.getDate()}`;
    });
    const precisions = versions.slice(0, 10).reverse().map(v =>
        v.metrics?.precision || 0
    );

    trendChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Precision',
                data: precisions,
                borderColor: '#60a5fa',
                backgroundColor: 'rgba(96, 165, 250, 0.1)',
                fill: true,
                tension: 0.4,
                pointBackgroundColor: '#60a5fa',
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: { beginAtZero: true, max: 1, grid: { color: '#334155' },
                     ticks: { color: '#64748b' } },
                x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
            },
            plugins: {
                legend: { labels: { color: '#e2e8f0' } }
            }
        }
    });
}

// ── 操作 ──────────────────────────────────────────────────────
async function triggerTraining() {
    try {
        log('🚀 正在触发训练管线...');
        toast('正在训练...', 'info');
        const result = await api('/api/ml/train', 'POST');
        log(`训练完成: ${result.message}`, result.run?.status === 'completed' ? 'ok' : 'err');
        toast(`训练完成: ${result.run?.status || '完成'}`, 'success');
        await refreshAll();
    } catch (e) {
        log(`训练失败: ${e.message}`, 'err');
        toast(`训练失败: ${e.message}`, 'error');
    }
}

async function autoDeploy() {
    try {
        log('🎯 正在自动部署最优模型...');
        const result = await api('/api/ml/auto-deploy', 'POST');
        log(`部署结果: ${result.message}`, 'ok');
        toast(result.message, 'success');
        await refreshAll();
    } catch (e) {
        log(`部署失败: ${e.message}`, 'err');
        toast(`部署失败: ${e.message}`, 'error');
    }
}

async function refreshAll() {
    await Promise.all([
        loadStatus(),
        loadVersions(),
        loadABTests(),
    ]);
    updateMetricsChart();
}

// ── 自动刷新 ──────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
    await refreshAll();
    // 每 30 秒自动刷新
    setInterval(refreshAll, 30000);
});
</script>
</body>
</html>
